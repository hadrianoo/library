<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <table>
        <caption>
            Books in my library.
        </caption>
        <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Title</th>
                <th scope="col">Author</th>
                <th scope="col">Pages</th>
                <th scope="col">Did you read it?</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <button command="show-modal" commandfor="add-book">New Book</button>
    <dialog id="add-book">
        <form action="" method="get" class="add-book-form">
            <div>
                <label for="title">Title</label>
                <input type="text" name="title" id="title" required placeholder="The Fellowship of the Ring">
            </div>
            <div>
                <label for="author">Author</label>
                <input type="text" name="author" pages id="author" required placeholder="J.R.R. Tolkien">
            </div>
            <div>
                <label for="pages">Pages</label>
                <input type="tel" name="pages" id="pages" required pattern="[0-9]{1,4}" placeholder="432">
            </div>
            <fieldset class="radio">
                <legend>Did you read it?</legend>
                <label for="read-true">Yes</label>
                <input type="radio" name="read" id="read-true" value="true" required>
                <label for="read-false">No</label>
                <input type="radio" name="read" id="read-false" value="false" required>
            </fieldset>
            <button class="submit" type="submit" commandfor="add-book" command="close">Add Book</button>
        </form>
        <p>All fields are required.</p>
    </dialog>

</body>

</html>
